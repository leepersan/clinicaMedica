<!DOCTYPE html>
<html lang="pt"> xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listagem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>
<main>
    <input type="hidden" id="tipoPagina" th:value="${tipo}">

    <header>
        <h1 id="tituloListagem"> Listar </h1>
        <p id="subtituloListagem"> Registos da clínica médica</p>
    </header>
    <nav class="menu">
        <a href="/registar">Novo Utilizador</a>
        <a href="/pacientes">Pacientes</a>
        <a href="/medicos">Médicos</a>
        <a href="/secretarias">Secretárias</a>
        <a href="/utilizadores">Utilizadores</a>
        <a href="disponibilidades">Disponibilidades</a>

    </nav>
    <section>
        <table id="tabelaRegisto">
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th th:if="${tipo=='UTILIZADOR'}">Perfil</th>
                <th th:if="${tipo=='MEDICO'}">Especialidade</th>
                <th>Data de Nascimento</th>
                <th>Idade</th>
                <th>Telefone</th>
                <th>Endereço</th>
            </tr>

            <tr th:each="item:${lista}">
                <td class="nome-registo"
                    th:text="${tipo=='UTILIZADOR'} ? ${item.nome}: ${item.utilizador.nome}"
                ></td>

                <td th:text="${tipo=='UTILIZADOR'} ? ${item.email}: ${item.utilizador.email}"
                ></td>

                <td th:if="${tipo=='UTILIZADOR'}"
            th:text="${item.perfil}">
                </td>

                <td th:if="${tipo=='MEDICO'}"
            th:text="${item.especialidade}">
                </td>

                <td th:text="${tipo=='UTILIZADOR'}
            ?${#temporals.format(item.dataNascimento, 'dd/MM/yyyy')}
            :${#temporals.format(item.utilizador.dataNascimento, 'dd/MM/yyyy')}"
                ></td>
              <td th:text="${tipo=='UTILIZADOR'} ? ${item.idade}: ${item.utilizador.idade}">
              </td>

                <td th:text="${tipo=='UTILIZADOR'} ? ${item.telefone}: ${item.utilizador.telefone}">
                </td>

                <td th:text="${tipo=='UTILIZADOR'} ? ${item.endereco}: ${item.utilizador.endereco}">
                </td>
            </tr>
        </table>

        <div class="botoes">
            <button type="button" onclick="destacarNomes()">Destacar nomes</button>
            <button type="button" onclick="esconderMostrarTabela()">Esconder/Mostrar tabela</button>
        </div>

    </section>
</main>
<script src="/js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Registar Utilizador</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body tema="tema-utilizador">
<main>
  <header class="cabecalho">
    <h1 id="tituloFormulario">Novo utilizador</h1>
    <p>Preencha os dados para registar um novo utilizador na clínica médica</p>
  </header>

  <nav class="menu">
    <a href="/home">Início</a>

    <a href="/consultas"
       th:if="${utilizador != null && (utilizador.perfil == 'PACIENTE' || utilizador.perfil == 'SECRETARIA')}">
      Consultas
    </a>

    <a href="/disponibilidades"
       th:if="${utilizador != null && utilizador.perfil == 'MEDICO'}">
      Disponibilidades
    </a>

    <a href="/receitas"
       th:if="${utilizador != null && utilizador.perfil == 'MEDICO'}">
      Receitas
    </a>

    <a href="/exames"
       th:if="${utilizador != null && utilizador.perfil == 'MEDICO'}">
      Exames
    </a>

    <a href="/pacientes"
       th:if="${utilizador != null && utilizador.perfil == 'SECRETARIA'}">
      Pacientes
    </a>

    <a href="/medicos"
       th:if="${utilizador != null && utilizador.perfil == 'SECRETARIA'}">
      Médicos
    </a>

    <a href="/secretarias"
       th:if="${utilizador != null && utilizador.perfil == 'SECRETARIA'}">
      Secretárias
    </a>

    <a href="/utilizadores"
       th:if="${utilizador != null && utilizador.perfil == 'SECRETARIA'}">
      Utilizadores
    </a>

    <a href="/logout">Sair</a>
  </nav>

  <section class="cartao">

    <p th:if="${erro}" th:text="${erro}" class="erro"></p>

    <form action="/registar" method="post" class="formulario">

      <label for="perfil">Tipo de utilizador</label>
      <select name="perfil" id="perfil" onchange="mudarFormulario()" required>
        <option value="">Selecione</option>
        <option value="PACIENTE">Paciente</option>
        <option value="MEDICO">Médico</option>
        <option value="SECRETARIA">Secretária</option>
      </select>

      <label for="nome">Nome Completo</label>
      <input type="text" id="nome" name="nome" placeholder="Nome completo" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Email" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="Senha" required>

      <label for="dataNascimento">Data de nascimento</label>
      <input type="date" id="dataNascimento" name="dataNascimento" required>

      <label for="telefone">Telefone</label>
      <input type="text" id="telefone" name="telefone" placeholder="Telefone" required>

      <label for="endereco">Endereço</label>
      <input type="text" id="endereco" name="endereco" placeholder="Endereço" required>

      <div id="campoEspecialidade" class="campo-especialidade">
        <label for="especialidade">Especialidade</label>
        <input type="text" id="especialidade" name="especialidade" placeholder="Especialidade médica" required>
      </div>

      <button type="submit" onclick="mostrarMensagem()">Adicionar</button>
    </form>

  </section>

</main>
<script src="/js/script.js"></script>
</body>
</html>
